<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Page</title>
    <link rel="stylesheet" href="payment.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="navbar">
      
        <nav>
            <ul id="MenuItems">
                <li><a href="index.html">Home</a></li>
                <li><a href="items.html">Items</a></li>
                <li><a href="cart.html">Checkout</a></li>
                <li><a href="CONTACTUS.html">Contact Us</a></li>
            </ul>
        </nav>
        <a href="cart.html">
        <img src="carts.png" width="30px" height="30px">
    </a>
        <img src="menu_icon-removebg-preview.png" class="menu-icon" onclick="menutoggle()">
    </div> 

    <!-- Header -->
       <div class="header-container">
           <div class="logo-container">
               <img class="logo" src="SUNUT.1-removebg-preview.png" width="125px">
           </div>
       
       </div>
       <center>
    <div class="payment-container">
        <div class="payment-form-wrapper">
             <h2 style="text-align: center; margin-bottom: 20px;">Payment Information</h2>
             <form id="paymentForm" novalidate>
                <div class="form-group">
                    <label for="cardholderName">Cardholder Name</label>
                    <input type="text" id="cardholderName"  required>
                </div>
                <div class="form-group">
                    <label for="cardNumber">Card Number</label>
                     <input type="text" id="cardNumber"  maxlength="19" required>
                 </div>
                <div class="form-group">
                    <label for="expiryDate">Expiry Date (MM/YY)</label>
                     <input type="text" id="expiryDate"  maxlength="5" required>
                </div>
                <div class="form-group">
                     <label for="cvv">CVV</label>
                    <input type="text" id="cvv" maxlength="4" required>
                </div>
               <button type="button" id="proceedButton">Proceed</button>
                 <div class="success-message" id="successMessage"></div>
                 <div class="error-message" id="errorMessage"></div>
             </form>
          </div>
    </div>
</center>
 <script src="payment.js"></script>
</body>
</html>
