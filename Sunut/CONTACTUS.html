    <link rel="stylesheet" href="style.css">

</head>
<body>

        <nav>
            <ul id="MenuItems">
                <li><a href="index.html">Home</a></li>

    </a>
        <img src="menu_icon-removebg-preview.png" class="menu-icon" onclick="menutoggle()">
    </div> 
    

    <div class="header">
        <div class="logo">
            <img src="SUNUT.1-removebg-preview.png" width="125px">
        </div>
     
    </div>

    <div class="main-content">
        <div class="container">
            <div class="form-section">
                <h2>Contact Us</h2>
                <form action="#" method="post" onsubmit="showMessage(); return false;">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter Name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Your Email</label>
                        <input type="email" id="email" name="email" placeholder="Enter Email" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Your Phone</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter Phone" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" placeholder="Enter your message" required></textarea>
                    </div>
                    <div class="form-group">
                        <button type="submit">Send Message</button>
                    </div class="form-group">
                        <div>
                          <input id="updates" type="checkbox" />
                          <label for="updates">I want to recive updates about new products and offers</label>
                        </div>
                </form>
            </div>

            <div class="info-section">
                <h2>Our Address</h2>
                <ul>
                    <li><span>Address:</span> HGV4+QFF, Khartoum, Sudan</li>
                    <li><span>Phone:</span> +905338741327</li>
                    <li><span>Email:</span> support@sunutstore.com</li>
                    <li><span>Working Hours:</span> 9:00 AM - 6:00 PM (Mon - Fri)</li>
                    <li><a href="https://maps.app.goo.gl/HfA7ufAjVEwr2JiM7">View on Google Maps</a></li>
                </ul>
            </div>
        </div>
    </div>
<script src="index.js"></script>
