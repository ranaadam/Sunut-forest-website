<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Page with Shopping Cart</title>
    <link rel="stylesheet" href="cart.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="navbar">
      
        <nav>
            <ul id="MenuItems">
                <li><a href="index.html">Home</a></li>
                <li><a href="cart.html">Items</a></li>
                <li><a href="cart.html">Checkout</a></li>
                <li><a href="CONTACTUS.html">Contact Us</a></li>
            </ul>
        </nav>
        <a href="cart.html">
        <img src="carts.png" width="30px" height="30px">
    </a>
        <img src="menu_icon-removebg-preview.png" class="menu-icon" onclick="menutoggle()">
    </div> 

   <!-- Header -->
   <div class="header-container">
     <div class="logo-container">
          <img class="logo" src="SUNUT.1-removebg-preview.png" width="125px">
      </div>
    
   </div>
    <!-- Product Category Dropdown -->
    <div class="category-select-container">
      <label for="categorySelect">Products: </label>
        <select id="categorySelect">
            <option value="">Select Category</option>
            <option value="ornamental">Ornamental Plants</option>
            <option value="gardening">Gardening Tools</option>
            <option value="saplings">Tree Saplings</option>
        </select>
    </div>

    <!-- Product Grid -->
    <div id="productGrid" class="product-grid-container"></div>

    <!-- Shopping Cart -->
    <div class="shopping-cart-container">
        <h3>Shopping Cart</h3>
        <table class="cart-table" id="cartTable">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <a href="payment.html">
            <button>Proceed to Payment</button>
        </a>
    </div>
    
    <!-- Total Amount -->
     <div class="total-cart-container">
        <strong>Total: $<span id="totalAmount">0.00</span></strong>
    </div>

    <!-------FOOTER------->
    
     <script src="cart.js"></script>
</body>
</html>
